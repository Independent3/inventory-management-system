name: CI

on:                              #triggers when to run
  push:                          #everytime we push to main/master
    branches: [ main, master ]
  pull_request:                  #everytime we pull request targeting those branches
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest       #runs on a fresh ubuntu Linux VM

    steps:
      - uses: actions/checkout@v3  #clones my repo to a fresh ubuntu VM

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'      #installs python 3.11 in the VM

      - name: Install dependencies       #upgrades to latest pip - installs dependencies - installs flake8
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt      
          pip install flake8

      - name: Lint with flake8   #E-style errors , W- warnings , F- logical errors
        run: |
          flake8 . --count --max-line-length=120 --ignore=E203,E231,E271,E275,E302,E303,E128,E122,W291,W292,F541 --statistics --exclude=.venv